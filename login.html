<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div class="container">

  <div class="left-panel">

    <div class="login-box">

      <h1>Masuk</h1>
      <p>Login ke akun MLBB Guide</p>

      <input type="text" id="username" placeholder="Username">
      
      <div style="position: relative; width: 100%; margin-bottom: 15px; display: block;">
        
        <input type="password" id="password" placeholder="Password" style="width: 100%; padding-right: 45px; box-sizing: border-box; margin-bottom: 0;">
        
        <i id="toggleIcon" class="fas fa-eye toggle-password-icon" onclick="togglePassword()" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 16px; user-select: none; z-index: 10; margin: 0; padding: 0; color: #666;"></i>
      
      </div>
      <button onclick="login()">Masuk</button>

      <div class="divider">atau</div>

      <button class="google-btn" onclick="loginGoogle()">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
      <span>Google</span>
      </button>

      <div class="bottom-text">
        Belum punya akun?
        <a href="register.html">Daftar</a>
      </div>

    </div>

  </div>

  <div class="right-panel">

    <div class="brand">
      <h2>MLBB Guide</h2>
      <p>Build • Counter • Tier List</p>
    </div>

  </div>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
